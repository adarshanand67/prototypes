services:
  mysql-master:
    image: mysql:8.0
    container_name: ecommerce-master
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ecommerce_master
    ports:
      - "3306:3306"
    volumes:
      - master-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  mysql-replica:
    image: mysql:8.0
    container_name: ecommerce-replica
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ecommerce_replica
    ports:
      - "3307:3306"
    volumes:
      - replica-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  master-data:
  replica-data:
